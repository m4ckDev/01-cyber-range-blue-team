title: Brute Force Pattern Recognition
id: BT-AUTH-002
status: experimental
description: Identifies multiple failed authentication attempts over a short training window.
author: Blue Team Cyber Range
logsource:
  product: linux
  service: sshd
detection:
  selection:
    event: Failed
  timeframe: 5m
  condition: selection | count(src) >= 5
fields:
  - timestamp
  - user
  - src
falsepositives:
  - Password reset mistakes
  - Repeated learner-generated test failures
level: medium
tags:
  - attack.credential_access
  - blue_team_lab
